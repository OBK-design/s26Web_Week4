<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- use the link tag to attach the css file -->
    <link href="styles/styles.css" rel="stylesheet" />
    <title>Contact Me</title>
  </head>
  <body>
    <header><h1>Contact Page</h1></header>

    <nav>
      <ul>
        <!-- Navigation is often organized in lists for easier styling-->
        <li><a href="index.html">Home</a></li>
        <li><a href="About.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li>
          <a href="https://imdac.github.io/" target="_blank">Mora stuff</a>
        </li>
      </ul>
    </nav>

    <main>
      <!-- HTML forms let users enter information into your site-->
      <form>
        <section>
          <!-- To link the lable with input,
             use "for" on the label matching the "id" on the input-->
          <label for="name">Name:</label>
          <input id="name" type="text" />
          <!-- With input, you can specify diffrent types of input -->
          <label for="email">Email :</label>
          <input id="email" type="email" />
        </section>
        <section>
          <!-- The section are block elemts, so these form elements will appear on the next line-->
          <label for="pass">Password:</label>
          <input id="pass" type="password" />

          <label for="when">When?</label>
          <input id="when" type="date" />

          <label for="how">How Many</label>
          <input id="how" type="Number" min="10" max="50" />
        </section>
        <section>
          <!-- To submit a form, add a submit button
             this button will submit everything contained inside of one form tag-->
          <!-- The Value attribute displays text on the button-->
          <input type="submit" value="Submit The Form" />
        </section>
      </form>
    </main>

    <footer></footer>
  </body>
</html>
